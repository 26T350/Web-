<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>奥祖谷二重かずら橋</title>
  <style>
    /* 全体の基本設定 */
    body {
      font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
      line-height: 1.8;
      color: #333;
      background-color: #f4f7f4;
      margin: 0;
      padding: 40px 20px;
    }

   
    .card {
      max-width: 700px;
      margin: 0 auto;
      background: #ffffff;
      padding: 35px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      
     
      animation: fadeInUp 1s ease-out forwards;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.12);
    }

   
    h1 {
      font-size: 2rem;
      color: #2e5b38; 
      border-bottom: 3px solid #82b74b;
      padding-bottom: 8px;
      margin-top: 0;
      margin-bottom: 20px;
    }

   
    .img-container {
      width: 100%;
      overflow: hidden;
      border-radius: 12px;
      margin-top: 25px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
    }

   
    .img-container img {
      width: 100%;
      height: auto;
      display: block;
      transition: transform 0.5s ease; 
    }

   
    .img-container:hover img {
      transform: scale(1.05);
    }

   
    .btn {
      display: inline-block;
      margin-top: 25px;
      padding: 12px 28px;
      background-color: #2e5b38;
      color: #ffffff;
      text-decoration: none;
      font-weight: bold;
      border-radius: 30px;
      transition: all 0.3s ease;
      box-shadow: 0 4px 10px rgba(46, 91, 56, 0.2);
    }

    .btn:hover {
      background-color: #3e7a4c;
      transform: translateY(-2px);
      box-shadow: 0 6px 15px rgba(46, 91, 56, 0.3);
    }

   
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>奥祖谷二重かずら橋</h1>
    <p>徳島県三好市にある秘境の吊り橋です。</p>
    <p>スリルと絶景を楽しむことができる観光スポットとして人気があります。</p>
    <p>吊り橋を渡ると、壮観な景色が広がります。</p>
    
   
    <div class="img-container">
      <img src="pixta_16381624_M.jpg" alt="奥祖谷二重かずら橋">
    </div>

  
    <div style="text-align: center;">
      <a href="https://maps.google.com/?q=奥祖谷二重かずら橋" target="_blank" rel="noopener" class="btn">
        Google Mapで場所を見る ↗
      </a>
    </div>
  </div>

</body>
</html>
